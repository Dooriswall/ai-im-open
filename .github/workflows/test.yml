name: CI Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --testPathPattern="config.test.js"

      - name: Start server and run integration tests
        run: |
          rm -f *.db
          cp .env.example .env
          node index.js &
          SERVER_PID=$!
          sleep 3
          npm test -- --testPathPattern="regression.test.js" || true
          kill $SERVER_PID || true
