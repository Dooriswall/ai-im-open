name: CI Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove lock file
        run: rm -f package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test -- --testPathPattern="config.test.js"

      - name: Start server and run integration tests
        run: |
          # Clean up any existing database
          rm -f *.db
          # Create test .env
          cp .env.example .env
          # Start server in background
          node index.js &
          SERVER_PID=$!
          # Wait for server to start
          sleep 3
          # Run only regression tests
          npm test -- --testPathPattern="regression.test.js" || true
          # Kill server
          kill $SERVER_PID || true
