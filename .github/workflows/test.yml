name: Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, dev/* ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install dependencies
        run: |
          cd server
          npm install
      
      - name: Syntax check
        run: |
          cd server
          node -c index.js
          node -c filesystem.js
          node -c permissions.js
          node -c fileRoutes.js
      
      - name: Start server test
        run: |
          cd server
          timeout 10 node index.js &
          sleep 3
          # Check if server started
          curl -sk https://localhost:8443/api/health || curl -s http://localhost:8800/api/health || echo "Server health check attempted"
        env:
          NODE_ENV: test
      
      - name: Lint check
        run: |
          cd server
          npx eslint *.js --no-eslintrc --env node --parser-options=ecmaVersion:2022 || true
