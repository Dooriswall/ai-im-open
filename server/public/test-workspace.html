<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WS Test</title>
<style>body{font-family:sans-serif;background:#1a1a2e;color:#eee;margin:0;padding:20px}.b{background:#252536;padding:15px;margin:10px 0;border-radius:8px}button{background:#e94560;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin:5px}pre{background:#1a1a2e;padding:10px;overflow:auto;border-radius:4px;font-size:13px}</style>
</head><body><h1>Workspace API Test</h1><div class="b"><button onclick="tp()">List Projects</button><button onclick="tc()">Create Project</button><button onclick="tl()">List Files</button><pre id="o">Click...</pre></div>
<script>
const t=localStorage.getItem("shrimp-token")||prompt("Token:");localStorage.setItem("shrimp-token",t);const o=document.getElementById("o");
async function a(p,opts){const r=await fetch(p,{headers:{"Authorization":"Bearer "+t},...opts});return r.json();}
async function tp(){o.textContent=JSON.stringify(await a("/api/files/project"),null,2)}
async function tc(){const n=prompt("Name:","my-project");if(!n)return;o.textContent=JSON.stringify(await a("/api/files/project",{method:"POST",headers:{"Authorization":"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({name:n})}),null,2)}
async function tl(){const p=prompt("Path:","")||"";o.textContent=JSON.stringify(await a("/api/files/list?path="+encodeURIComponent(p)+"&depth=1"),null,2)}
</script></body></html>
